<!DOCTYPE html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>TaipanMiner Setup</title>
<link rel='icon' type='image/svg+xml' href='/favicon.ico'>
<link rel='stylesheet' href='/theme.css'>
<style>
.password-wrapper{position:relative}
.toggle-pass{position:absolute;right:12px;bottom:14px;background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:0;display:flex;align-items:center}
.toggle-pass:hover{color:var(--accent-hover)}
.scan-controls{display:flex;gap:8px;align-items:stretch}
.wifi-select{position:relative;flex:1}
.wifi-selected{width:100%;padding:12px;padding-right:30px;background:var(--input);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:14px;box-sizing:border-box;cursor:pointer;position:relative;min-height:44px;display:flex;justify-content:space-between;align-items:center}
.wifi-selected::after{content:'';position:absolute;right:12px;top:50%;transform:translateY(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid var(--accent)}
.wifi-list{display:none;position:absolute;top:100%;left:0;right:0;background:var(--input);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;max-height:200px;overflow-y:auto;z-index:10}
.wifi-list.open{display:block}
.wifi-item{display:flex;justify-content:space-between;align-items:center;padding:10px 30px 10px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
.wifi-item:hover{background:var(--border)}
.wifi-item:last-child{border-bottom:none}
.wifi-ssid{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wifi-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:10px}
.rescan-btn{background:none;color:var(--accent);border:1px solid var(--border);padding:12px;border-radius:4px;cursor:pointer;font-size:14px;min-height:44px;min-width:44px;flex-shrink:0;transition:border-color 0.2s}
.rescan-btn:hover{border-color:var(--accent)}
.manual-entry{margin-top:10px;margin-bottom:15px;display:none}
</style>
</head><body><div class='container'>
<div class='header'>
<div id='logo'></div>
<h1>TaipanMiner</h1>
</div>
<form method='POST' action='/save'>
<div class='section'><h2>WiFi</h2>
<div class='form-group'><label>Network</label>
<div class='scan-controls'>
<div class='wifi-select' id='wifiSelect'>
<div class='wifi-selected' id='wifiSelected'>Scanning...</div>
<div class='wifi-list' id='wifiList'></div>
</div>
<button type='button' class='rescan-btn' id='rescanBtn'><svg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M23 4v6h-6'/><path d='M1 20v-6h6'/><path d='M3.51 9a9 9 0 0114.85-3.36L23 10'/><path d='M20.49 15a9 9 0 01-14.85 3.36L1 14'/></svg></button>
</div>
</div>
<input type='hidden' name='ssid' id='ssidInput' required>
<span class='field-error' id='err-ssid'></span>
<div class='manual-entry' id='manualEntry'>
<input type='text' id='manualSsid' placeholder='Enter SSID' maxlength='31'>
</div>
<div class='form-group password-wrapper'>
<label>Password</label>
<input type='password' id='passInput' name='pass' maxlength='63'>
<button type='button' class='toggle-pass' id='togglePass'><svg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg></button>
</div>
</div>
<div class='section'><h2>Mining</h2>
<div class='form-group'>
<label for='wallet'>Wallet Address</label>
<input type='text' id='wallet' name='wallet' maxlength='63' required placeholder='1BTC...'>
<span class='field-error' id='err-wallet'></span>
</div>
<div class='form-group'>
<label for='worker'>Worker Name</label>
<input type='text' id='worker' name='worker' maxlength='31' required placeholder='miner-1'>
<span class='field-error' id='err-worker'></span>
</div>
</div>
<div class='section'><h2>Pool</h2>
<div class='form-group'>
<label for='pool_host'>Host</label>
<input type='text' id='pool_host' name='pool_host' maxlength='63' required placeholder='pool.example.com'>
<span class='field-error' id='err-pool_host'></span>
</div>
<div class='form-group'>
<label for='pool_port'>Port</label>
<input type='text' inputmode='numeric' pattern='[0-9]*' id='pool_port' name='pool_port' required placeholder='3333'>
<span class='field-error' id='err-pool_port'></span>
</div>
<div class='form-group'>
<label for='pool_pass'>Password</label>
<input type='text' id='pool_pass' name='pool_pass' maxlength='63' placeholder='optional'>
</div>
</div>
<input type='submit' value='Save &amp; Connect'>
</form>
<div class='footer'>Powered by TaipanMiner <span id='ver'></span></div>
</div>
<script>
var ACCENT='#e5ad30',MUTED='#666';
var wifiSelect=document.getElementById('wifiSelect');
var wifiSelected=document.getElementById('wifiSelected');
var wifiList=document.getElementById('wifiList');
var ssidInput=document.getElementById('ssidInput');
var rescanBtn=document.getElementById('rescanBtn');
var passInput=document.getElementById('passInput');
var togglePass=document.getElementById('togglePass');
var manualEntry=document.getElementById('manualEntry');
var manualSsid=document.getElementById('manualSsid');
wifiSelected.addEventListener('click',function(){wifiList.classList.toggle('open')});
document.addEventListener('click',function(e){if(!wifiSelect.contains(e.target)&&!rescanBtn.contains(e.target))wifiList.classList.remove('open')});
function getSignalSvg(rssi){
var c1=rssi>=-80?ACCENT:MUTED;
var c2=rssi>=-67?ACCENT:MUTED;
var c3=rssi>=-50?ACCENT:MUTED;
return '<svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:middle">'
+'<path d="M9.1 16.8A4.5 4.5 0 0114.9 16.8L13 18.8A1.5 1.5 0 0011 18.8Z" fill="'+c1+'"/>'
+'<path d="M5.6 12.4A10 10 0 0118.4 12.4L16.4 14.6A7 7 0 007.6 14.6Z" fill="'+c2+'"/>'
+'<path d="M2.2 7.8A15.5 15.5 0 0121.8 7.8L19.8 10A12 12 0 004.2 10Z" fill="'+c3+'"/>'
+'</svg>'
}
function getLockSvg(){
return '<svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><rect x="2" y="8" width="12" height="7" rx="1" fill="'+ACCENT+'"/><path d="M5 8V5a3 3 0 016 0v3" fill="none" stroke="'+ACCENT+'" stroke-width="2" stroke-linecap="round"/></svg>'
}
var netInfo={};
function selectNetwork(ssid){
ssidInput.value=ssid;
if(ssid==='__manual__'){wifiSelected.innerHTML='Manual entry';manualEntry.style.display='block'}
else{var meta=netInfo[ssid];var icons=meta?'<span class="wifi-meta">'+(meta.secure?getLockSvg():'')+getSignalSvg(meta.rssi)+'</span>':'';wifiSelected.innerHTML='<span class="wifi-ssid">'+ssid+'</span>'+icons;manualEntry.style.display='none'}
wifiList.classList.remove('open')
}
function scanNetworks(){
rescanBtn.disabled=true;
wifiSelected.innerHTML='Scanning...';
wifiList.innerHTML='';
ssidInput.value='';
fetch('/api/scan').then(function(r){return r.json()}).then(function(aps){
wifiList.innerHTML='';
if(aps.length===0){wifiSelected.innerHTML='No networks found';rescanBtn.disabled=false;return}
netInfo={};
aps.forEach(function(ap){
netInfo[ap.ssid]={rssi:ap.rssi,secure:ap.secure};
var item=document.createElement('div');
item.className='wifi-item';
item.innerHTML='<span class="wifi-ssid">'+ap.ssid+'</span><span class="wifi-meta">'+(ap.secure?getLockSvg():'')+getSignalSvg(ap.rssi)+'</span>';
item.addEventListener('click',function(){selectNetwork(ap.ssid)});
wifiList.appendChild(item)});
var manual=document.createElement('div');
manual.className='wifi-item';
manual.innerHTML='<span class="wifi-ssid" style="color:var(--label)">Manual entry...</span>';
manual.addEventListener('click',function(){selectNetwork('__manual__')});
wifiList.appendChild(manual);
selectNetwork(aps[0].ssid);
rescanBtn.disabled=false
}).catch(function(){wifiSelected.innerHTML='Scan failed';rescanBtn.disabled=false})
}
rescanBtn.addEventListener('click',scanNetworks);
var eyeOpen='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
var eyeOff='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
togglePass.addEventListener('click',function(e){e.preventDefault();if(passInput.type==='password'){passInput.type='text';togglePass.innerHTML=eyeOff}else{passInput.type='password';togglePass.innerHTML=eyeOpen}});
function setErr(inputId,errId,msg){
var el=document.getElementById(inputId);
var er=document.getElementById(errId);
if(msg){el.classList.add('invalid');er.textContent=msg;er.classList.add('visible')}
else{el.classList.remove('invalid');er.textContent='';er.classList.remove('visible')}
}
['wallet','worker','pool_host','pool_port'].forEach(function(id){
document.getElementById(id).addEventListener('input',function(){setErr(id,'err-'+id,'')})});
document.querySelector('form').addEventListener('submit',function(e){
if(ssidInput.value==='__manual__'){
if(!manualSsid.value){setErr('ssidInput','err-ssid','Network is required');e.preventDefault();return}
ssidInput.value=manualSsid.value}
var valid=true;
if(!ssidInput.value){setErr('ssidInput','err-ssid','Network is required');valid=false}
else{setErr('ssidInput','err-ssid','')}
if(!document.getElementById('wallet').value.trim()){setErr('wallet','err-wallet','Required');valid=false}
else{setErr('wallet','err-wallet','')}
if(!document.getElementById('worker').value.trim()){setErr('worker','err-worker','Required');valid=false}
else{setErr('worker','err-worker','')}
if(!document.getElementById('pool_host').value.trim()){setErr('pool_host','err-pool_host','Required');valid=false}
else{setErr('pool_host','err-pool_host','')}
var p=parseInt(document.getElementById('pool_port').value,10);
if(!p||p<1||p>65535){setErr('pool_port','err-pool_port','Valid port (1\u201365535) required');valid=false}
else{setErr('pool_port','err-pool_port','')}
if(!valid)e.preventDefault()});
fetch('/logo.svg').then(function(r){return r.text()}).then(function(s){document.getElementById('logo').innerHTML=s});
fetch('/api/version').then(function(r){return r.text()}).then(function(v){document.getElementById('ver').textContent='v'+v});
window.addEventListener('load',scanNetworks);
</script>
</body></html>
