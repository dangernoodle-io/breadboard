[lint]
default_profile = "library"

[lint.rules.deprecated-http-send]
severity = "error"

[lint.rules.public-header-leak]
severity = "error"

[lint.rules.state-topic-post]
severity = "error"

[lint.rules.raw-allocator]
severity = "error"
# Allowlist: path strings or "path:line" keys for intentional raw-allocator uses.
# bb_json_cjson.c uses a stack-overflow-safe temp malloc inside the cJSON adapter layer;
# these are not bb_mem allocations and must not be migrated.
allow = [
    "platform/espidf/bb_json/bb_json_cjson.c",
    "platform/host/bb_json/bb_json_cjson.c",
]

[lint.rules.raw-esp-timer]
severity = "error"

[lint.rules.timer-cb-heavy]
severity = "error"

[lint.rules.platform-error-in-public-struct]
severity = "warn"
# Allowlist: field names (or "path:line" keys) that are intentional diagnostic/log-only fields.
# Example: allow = ["tls_error_code"]
# tls_error_code (bb_http_client.h, bb_mqtt_client.h): raw mbedtls error code,
# diagnostic/log-only, never fed into control flow (B1-899).
allow = ["tls_error_code"]

[lint.rules.ticket-ref-in-log]
severity = "error"
# Ticket ID prefixes to flag inside bb_log_* string literals.
prefixes = ["B1", "TA"]

[lint.rules.bb-prefix]
severity = "warn"
# Allowlist: symbol names (function or macro) that are intentional non-bb_ public symbols
# (e.g. chip-specific register names that must match upstream naming).
# Example: allow = ["WIFI_SCAN_MAX", "TPS546_FAULT_IOUT_OC"]
allow = []

[lint.rules.pragma-once]
severity = "error"

[lint.rules.no-arduino-string]
severity = "error"

[lint.rules.public-header-inline-platform-call]
severity = "error"

[lint.rules.kconfig-default-mismatch]
severity = "error"
# Allowlist: Kconfig symbol names (e.g. "BB_LOG_EVENT_QUEUE_LEN") or
# "path:line" keys for intentional C-fallback/Kconfig-default divergence.
allow = []

[lint.rules.task-creation-without-registration]
severity = "error"
# Allowlist: file paths (relative to repo root) for tasks that legitimately
# skip bb_task_registry — e.g. vendored/SDK task-creation shims.
#
# platform/espidf/bb_task/bb_task_espidf.c: bb_task is the SSOT
# task-creation primitive introduced by the task-registry unification
# effort (PR2b) and is deliberately independent of bb_task_registry (no
# cycle) -- it records every task it creates in its own pointer-keyed base
# registry (bb_task_base_upsert) instead. A later PR migrates existing
# bb_task_registry callers onto bb_task; until then both coexist.
allow = ["platform/espidf/bb_task/bb_task_espidf.c"]

[lint.rules.component-readme]
severity = "warn"
# Fires broadly on components lacking a README.md today (expected — B1-644
# taxonomy decision + open forks gate the fill). Flip to "error" once the
# fill lands (B1-646).

[lint.rules.kconfig-bridge-shadow]
severity = "error"

[lint.rules.raw-timestamp-divide]
severity = "warn"
# Allowlist: path strings or "path:line" keys for intentional raw millisecond
# conversions outside bb_clock.c/bb_clock.h and bb_timer/.
allow = []

[lint.rules.emit-seam-unwired-subscriber]
severity = "error"
# Allowlist: two granularities --
#   "examples/<name>/main" app paths that intentionally link an emit-seam
#   publisher and a subscriber of its topic without wiring them (e.g. the
#   subscriber genuinely doesn't need this topic in that app), or the finer
#   "examples/<name>/main:<setter>" key to suppress just one seam's setter
#   for that app.
allow = []

[docs]
repo_url = "https://github.com/dangernoodle-io/breadboard"
wiki_base = "https://github.com/dangernoodle-io/breadboard/wiki"
# Global extra links, applied to every component README's generated Links
# section (merged with the component's own wiki_base/components/<name> link
# and any [docs.component_links] entries below, deduplicated by URL).
links = ["https://github.com/dangernoodle-io/breadboard/wiki/Component-Docs"]

# Per-component extra links, keyed by component name -> list of URLs.
# Only entries for components that opt in need appear here.
[docs.component_links]
bb_filter = ["https://github.com/dangernoodle-io/breadboard/wiki/bb_filter-pressure-shed"]

[plugins]
paths = []

# --- bbtool scaffold: capability/board manifest (Phase 1, B1-663 foundation) ---
# See scripts/bbtool/boards.py + scripts/bbtool/commands/scaffold.py.
# `core` is listed explicitly in [board.native]'s own `capabilities` (below)
# rather than `required = true` -- `required` auto-applies a capability to
# EVERY board in this file (boards.py: resolve_active_capabilities), which
# would leak core's ~100-component host-scaffold list into the unrelated
# examples/smoke + examples/floor manifest tables added by B1-747 below (a
# real regression caught by that ticket's byte-identical bb_app_init.c
# check). Net resolved set for `native` is unchanged either way. This
# dogfoods scaffold on breadboard's own [env:native] host test env
# (custom_bb_board = native in platformio.ini), replacing the old
# scripts/native_scaffold.py hand-maintained COMPONENT_MAP.
#
# bb_data_http (B1-1033 PR-2) lives here only because `core` is the sole
# capability that reaches the host build/test graph today -- there is no
# dedicated http/egress capability yet. Provisional: revisit once PR-3 wires
# a real espidf consumer (B1-1045) and/or an http/egress capability exists.
[capability.core]
components = [
    "bb_attrs", "bb_board", "bb_bqueue", "bb_button",
    "bb_button_events", "bb_button_gpio", "bb_cache", "bb_cache_reactive", "bb_cache_serialize",
    "bb_cache_routes", "bb_collection", "bb_config", "bb_core", "bb_data", "bb_data_http", "bb_diag",
    "bb_display",
    "bb_fan", "bb_filter", "bb_fmt", "bb_fsm", "bb_health", "bb_http",
    "bb_http_client", "bb_http_server", "bb_i2c", "bb_json",
    "bb_led", "bb_led_anim", "bb_led_apa102", "bb_led_gpio",
    "bb_led_pwm", "bb_led_rgb_pwm", "bb_lifecycle", "bb_log", "bb_log_event", "bb_manifest", "bb_mdns",
    "bb_mdns_cache", "bb_mem_arena", "bb_mem_arena_tls", "bb_mqtt_client",
    "bb_ntp", "bb_num", "bb_openapi", "bb_ota_boot",
    "bb_ota_check", "bb_ota_hooks", "bb_ota_pull", "bb_ota_push", "bb_ota_validator",
    "bb_partition", "bb_pool", "bb_power", "bb_power_health",
    "bb_power_tps546",
    "bb_queue",
    "bb_registry", "bb_release_manifest", "bb_ring_diag",
    "bb_scalar", "bb_sensors", "bb_serialize", "bb_serialize_console", "bb_serialize_json",
    "bb_serialize_logfmt", "bb_settings",
    "bb_storage", "bb_storage_http", "bb_storage_ram", "bb_storage_rtc",
    "bb_str", "bb_system", "bb_task", "bb_task_registry",
    "bb_tcp_client", "bb_temp", "bb_thermal", "bb_timer", "bb_tls_creds",
    "bb_udp_client", "bb_udp_frame", "bb_wdt", "bb_wifi", "bb_wifi_ap", "bb_wifi_http", "bb_wifi_prov", "bb_ws_server",
]

[board.native]
platform = "host"
capabilities = ["core"]

# --- examples/smoke + examples/floor composition manifest (B1-747) ---
# Collapses the hand-synced component lists this ticket kills:
#   1. examples/smoke/main/CMakeLists.txt's hand-written SMOKE_REQUIRES +
#      board-conditional list(APPEND ...) groups.
#   2. the Makefile's hand-typed --components strings for smoke-gen/floor-gen.
# See scripts/bbtool/boards.py (resolve_component_names, unchanged/reused --
# no new grammar) + scripts/bbtool/commands/codegen.py's `--board` flag.
# Unrelated to [capability.core]/[board.native] above, which serve only
# `bbtool scaffold`'s host env -- do not conflate the two concerns.
#
# `capability.smoke.components` is the REQUIRES-authoritative baseline:
# today's SMOKE_REQUIRES set verbatim, including bb_wifi_ap (a link-proof-
# only component with no `// bbtool:init` marker -- its previous omission
# from the Makefile's separate wire-only list was drift, not intent; folding
# it in here changes nothing functionally). Board-conditional REQUIRES
# groups (display / power+fan) move to each board's own `add_components`.
# bb_storage_rtc (PR3a, WiFi-creds cluster, #823) carries a real
# `// bbtool:init tier=early` marker, unlike bb_wifi_ap above -- it stays
# in both this REQUIRES closure AND the
# `smoke_wire_baseline` wire set below (only reaches the latter by NOT
# appearing in that board's `remove_components`).
# bb_bqueue is the same link-proof-only shape as bb_wifi_ap above: no
# `// bbtool:init` marker (nothing wires a bb_bqueue instance at smoke
# app-init time), included here solely so its espidf backend
# (platform/espidf/bb_bqueue/bb_bqueue.c) actually compiles under CI's
# smoke matrix instead of only ever building on the host env.
# bb_fsm, bb_lifecycle, and bb_tcp_client (B1-849) are the same
# link-proof-only shape: none carries a `// bbtool:init` marker (nothing
# wires an instance of any of them at smoke app-init time). All three
# previously lived only in [capability.core] (host scaffold), so they had
# NEVER been compiled by the ESP-IDF toolchain -- a different compiler,
# arch, and warning set than host gcc. bb_tcp_client has a real espidf
# backend (platform/espidf/bb_tcp_client/bb_tcp_client.c); bb_fsm and
# bb_lifecycle are portable single-TU components with no platform/espidf/
# directory at all, but still benefit from proving the ESP-IDF toolchain
# compiles them cleanly. TaipanMiner's rebuild sits on all three (stratum
# FSM, stratum transport, mining run-state), so a latent compile break
# here would land squarely on TM.
[capability.smoke]
components = [
    "bb_log", "bb_log_event", "bb_log_http", "bb_wifi", "bb_wifi_ap",
    "bb_wifi_http", "bb_settings", "bb_http", "bb_http_server", "bb_mdns",
    "bb_mdns_cache", "bb_ota_pull", "bb_ota_push", "bb_ota_boot",
    "bb_board", "bb_manifest", "bb_ota_validator", "bb_system", "bb_openapi",
    "bb_led", "bb_ntp", "bb_led_gpio",
    "bb_led_pwm", "bb_led_apa102", "bb_led_anim", "bb_button", "bb_button_gpio",
    "bb_button_events", "bb_queue_espidf", "bb_ring_diag",
    "bb_http_client", "bb_release_manifest", "bb_ota_check", "bb_temp",
    "bb_power", "bb_fan", "bb_sensors", "bb_serialize", "bb_serialize_json", "bb_tls_creds", "bb_mqtt_client",
    "bb_ws_server",
    "bb_registry", "bb_partition", "bb_task_registry", "bb_task",
    "bb_mem_arena", "bb_pool", "bb_udp_frame", "bb_udp_client",
    "bb_meminfo", "bb_timer", "bb_config",
    "bb_storage_nvs", "bb_storage_http", "bb_storage_rtc", "bb_bqueue",
    "bb_fsm", "bb_lifecycle", "bb_tcp_client", "bb_serialize_console",
]

# Real smoke espidf boards -- the board id IS the literal FIRMWARE_BOARD
# value the espidf build defines (board_build.cmake_extra_args in
# examples/smoke/platformio.ini), so `bbtool codegen --board <id>` can embed
# it unchanged as `BB_AUTOWIRE_BOARD`, the stale-fragment guard
# examples/smoke/main/CMakeLists.txt checks against `FIRMWARE_BOARD`.
[board.esp32_wroom_32]
# Covers every env sharing FIRMWARE_BOARD=esp32_wroom_32: esp32,
# esp32-autofan, esp32-cache-sweep, esp32-boot-progress, esp32-boot-status.
platform = "espidf"
capabilities = ["smoke"]
add_components = ["bb_power_tps546", "bb_fan_emc2101"]

[board.esp32_c3_devkitm_1]
platform = "espidf"
capabilities = ["smoke"]

[board.lilygo_t_dongle_s3]
platform = "espidf"
capabilities = ["smoke"]
# tdongle appeared in BOTH the display group and the power/fan group in the
# pre-manifest CMakeLists.txt -- add_components unions both.
add_components = [
    "bb_display", "bb_display_st77xx",
    "bb_power_tps546", "bb_fan_emc2101",
]

[board.elecrow_p4_hmi7]
platform = "espidf"
capabilities = ["smoke"]
add_components = ["bb_display", "bb_display_ek79007"]

# NOT a real target -- resolves the fixed, board-invariant set `bbtool
# codegen --wire-board smoke_wire_baseline` uses to regenerate
# bb_app_init.c, matching exactly the set the Makefile's hand-typed
# --components string used pre-manifest (capability.smoke.components minus
# bb_wifi_ap, which carries no `// bbtool:init` marker, so its absence from
# wire resolution is a no-op). Wire generation
# is DELIBERATELY kept board-invariant: bb_display carries a real
# `// bbtool:init` marker (bb_display_info_register_init, B1-893: re-homed
# from the deleted bb_display_info satellite) but is only reachable via a
# board's add_components above, and board-parameterizing wire the same way
# REQUIRES now is would silently start calling bb_display_info_register_init()
# on display boards -- an unvalidated runtime behavior change (separate
# ticket, needs HW).
[board.smoke_wire_baseline]
platform = "espidf"
capabilities = ["smoke"]
remove_components = ["bb_wifi_ap"]

[capability.floor]
# B1-973 slice 1a: bb_lifecycle manages the HTTP server's start/stop (its
# first real consumer) so floor can take a heap-with-HTTP reading. This is
# NOT smoke's closure -- floor's runtime path (main/floor_app.c) only calls
# bb_storage_nvs_register() + bb_wifi_ensure_net_stack()/bb_wifi_autoinit(),
# never bb_settings_creds_boot_init(), so it never runs smoke's creds-boot
# shell. The runtime-used set is bb_wifi (net stack + creds-driven connect,
# PRIV_REQUIRES bb_settings) + bb_storage_nvs (creds read/write) +
# bb_http + bb_http_server (the server) + bb_lifecycle (start/stop
# authority). bb_storage_rtc is listed solely to satisfy the codegen
# closure proof (`make floor-codegen`): bb_settings ships a
# bb_settings_creds_boot_init init marker with requires=storage_rtc, so the
# codegen resolver needs a storage_rtc provider in the manifest even though
# floor's handwire path never calls that init fn -- dropping it re-breaks
# `make floor-codegen`.
#
# bb_serialize_console: floor's heap-emit call site
# (bb_serialize_console_heap_report()) is the first live app call site of
# the serialization emit stack -- pulls in bb_serialize + bb_core
# transitively via its own REQUIRES.
#
# B1-1025: bb_data + bb_serialize_json + bb_system added -- floor's two
# diag routes (GET /api/diag/meminfo, GET /api/diag/system) bind
# bb_meminfo_heap_snap_desc/bb_system_snap_desc into bb_data's binding
# table and render them via the JSON format backend on every request.
# bb_meminfo is already in this list (floor's heap-log tick); bb_system is
# new here solely for its snap descriptor/fill fn.
#
# B1-1045 PR-4 (cutover): floor expands into the full Model-B egress vehicle
# -- bb_log_event binds the "log" bb_data key (the sole dissolved-bb_event
# producer floor scopes in; the other 5 producer keys -- ota.progress
# (bb_ota_hooks), health.stack (bb_health, unrelated to the /api/health
# route added below), diag.boot, health.display (bb_display),
# update.available (bb_ota_check) -- stay out of floor's bb_data-bound
# scope, smoke's own event-cutover rehab is B1-1051); bb_mqtt_client +
# bb_mdns observe the repointed "wifi" bb_lifecycle service; bb_data_http
# is the converged SSE/WS broadcaster served at /api/events. Floor's
# heap-baseline identity moves as a result (near-term measurement vehicle,
# not smoke's closure).
#
# PR11 (B1-diag-dissolution, floor HW-validation gate): bb_diag added --
# NOT for the dissolved-bb_event "diag.boot" producer key above (that stays
# out of scope), but for the separate bb_diag section registry
# (bb_diag_sections_init() + bb_diag_register_section()) serving the
# "meminfo"/"system" sections (converted off the old bb_data-bound exact
# routes) plus the "storage/nvs"/"storage/partitions" inventory sections
# (PR9) that previously had zero call sites.
#
# B1-1100 (bb_health/bb_response migration chain, PR-5, epic B1-1054):
# bb_health + bb_temp added -- floor is the handwire HW-validation vehicle
# for the composed GET /api/health cutover (gather-then-stream off the
# bb_health_section registry). bb_health_init(server) is called from
# http_lifecycle_observer's RUNNING-entry branch; bb_temp_autoregister_init()
# and bb_mqtt_client_health_autoregister_init() (mqtt client is already in
# this manifest) register the "temp"/"mqtt" sections composition-time-only,
# before that freeze. This is unrelated to the still-out-of-scope
# "health.stack" bb_data producer key noted above.
components = [
    "bb_log", "bb_meminfo", "bb_timer",
    "bb_wifi", "bb_storage_nvs", "bb_storage_rtc", "bb_settings",
    "bb_http", "bb_http_server", "bb_lifecycle",
    "bb_data", "bb_serialize_json", "bb_system", "bb_diag",
    "bb_serialize_console", "bb_health", "bb_temp",
    "bb_log_event", "bb_mqtt_client", "bb_mdns", "bb_data_http",
]

[board.floor]
platform = "espidf"
capabilities = ["floor"]
