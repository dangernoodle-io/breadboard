[platformio]
src_dir = test

[env:native]
platform = native
test_framework = unity
test_filter = test_host
extra_scripts = pre:scripts/coverage.py
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -Icomponents/log_stream/include
    -Icomponents/http_server/include
    -Icomponents/ota_pull/include
    -Ithirdparty/cjson
    -lm
test_build_src = yes
build_src_filter = +<../components/log_stream/src/log_stream.c> +<../components/http_server/src/http_utils.c> +<../components/ota_pull/src/ota_pull.c> +<../thirdparty/cjson/cJSON.c>
