[platformio]
src_dir = test

[env:native]
platform = native
test_framework = unity
test_filter = test_host
extra_scripts =
    pre:scripts/coverage.py
    pre:scripts/native_scaffold.py
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -DBB_LED_ANIM_MOCK_CLOCK
    -DBB_BUTTON_MOCK_CLOCK
    -DBB_BUTTON_EVENTS_MOCK_CLOCK
    -DCONFIG_BB_EVENT_MAX_TOPICS=64
    -DBB_SINK_EVENT_MAX_TOPICS=4
    -DCONFIG_BB_EVENT_MAX_PAYLOAD=512
    -DCONFIG_BB_LOG_TAG_REGISTRY_MAX=24
    -DCONFIG_BB_UPDATE_CHECK_CUSTOM_PARSER_BUF_BYTES=8192
    -DBB_EVENT_TESTING
    -DBB_EVENT_ROUTES_TESTING
    -DBB_UPDATE_CHECK_TESTING
    -DBB_OTA_PULL_TESTING
    -DBB_OTA_HOOKS_TESTING
    -DBB_DISPLAY_TESTING
    -DBB_MDNS_TESTING
    -DBB_SYSTEM_TESTING
    -DBB_WDT_TESTING
    -DBB_TIMER_TESTING
    -DBB_INFO_TESTING
    -DBB_HTTP_TESTING
    -DBB_TEMP_TESTING
    -DBB_HEALTH_TESTING
    -DBB_WIFI_TESTING
    -DBB_BOARD_TESTING
    -DBB_POWER_TESTING
    -DBB_POWER_ROUTES_TESTING
    -DBB_I2C_TESTING
    -DBB_FAN_TESTING
    -DBB_FAN_ROUTES_TESTING
    -DCONFIG_BB_FAN_AUTOFAN
    -DBB_MQTT_TESTING
    -DBB_SINK_HTTP_TESTING
    -DCONFIG_BB_MQTT_KEEPALIVE=120
    -DCONFIG_BB_MQTT_NETWORK_TIMEOUT_MS=30000
    -DCONFIG_BB_MQTT_TLS_ENABLE=1
    -DCONFIG_BB_HTTP_TLS_ENABLE=1
    -DCONFIG_BB_TLS_MUTUAL_ENABLE=1
    -DBB_CLAIM_TESTING
    -DBB_PUB_TESTING
    -DCONFIG_BB_PUB_MAX_SOURCES=8
    -DCONFIG_BB_PUB_MAX_SINKS=4
    -DBB_PUB_MAX_PAYLOAD_EXTENDERS=4
    -DCONFIG_BB_PUB_TOPIC_PREFIX=\"metrics\"
    -DCONFIG_BB_PUB_INTERVAL_MS=10000
    -DCONFIG_BB_PUB_BUFFER_ENABLE=1
    -DCONFIG_BB_PUB_BUFFER_MAX_ENTRIES=16
    -DCONFIG_BB_PUB_BUFFER_MAX_PAYLOAD_BYTES=256
    -DCONFIG_BB_PUB_BUFFER_ALWAYS=1
    -DCONFIG_BB_PUB_BUFFER_IDLE_FREE_TICKS=30
    -DBB_RESPONSE_TESTING
    -DBB_TELEMETRY_TESTING
    ; Kconfig default is 6 (components/bb_telemetry/Kconfig); pinned to 4 here
    ; intentionally to keep test_bb_telemetry's overflow scenario cheap. This
    ; is a deliberate host-test override, not a stale value (B1-459).
    -DCONFIG_BB_TELEMETRY_MAX_SECTIONS=4
    -DBB_MQTT_TELEMETRY_TESTING
    -DBB_SINK_HTTP_TELEMETRY_TESTING
    -DBB_PUB_TELEMETRY_TESTING
    -DBB_THERMAL_TESTING
    -DBB_SENSORS_TESTING
    -DCONFIG_BB_NV_FACTORY_RESET=1
    -DCONFIG_BB_NV_FACTORY_RESET_AUTOREGISTER=1
    -DBB_NV_FACTORY_RESET_TESTING
    -DBB_NV_DELETE_ROUTES_TESTING
    -DBB_HTTP_BODY_TESTING
    -DBB_PUB_WIFI_TESTING
    -DBB_PUB_HEALTH_TESTING
    -DBB_TLS_CREDS_TESTING
    -DCONFIG_BB_HEAP_ARENA_BYTES=256
    -DBB_HEAP_ARENA_TESTING
    -DCONFIG_BB_METRICS_PREFIX=\"bb\"
    -DBB_SINK_EVENT_TESTING
    -DBB_SINK_WS_TESTING
    -DBB_CACHE_TESTING
    -DCONFIG_BB_CACHE_MAX_TOPICS=32
    -DCONFIG_BB_PUB_TELEM_SNAP_MAX=512
    -DBB_MEM_STATS_ENABLE=1
    -DBB_MEM_TESTING
    -DCONFIG_BB_PUB_TELEM_SERIALIZE_MAX=512
    -DCONFIG_BB_PUB_LEGACY_TRANSPORT_INJECT=0
    -DBB_ALERT_ENABLE=1
    -DBB_ALERT_MIN_SEVERITY=0
    -DBB_ALERT_TESTING
    -DBB_REGISTRY_TESTING
    -DBB_RING_REGISTRY_TESTING
    -DBB_TASK_REGISTRY_TESTING
    -lm
lib_deps = https://github.com/DaveGamble/cJSON.git#v1.7.18
custom_bb_components = bb_alert bb_core bb_log bb_diag bb_http bb_prov bb_ota_pull bb_ota_push bb_ota_boot bb_ota_validator bb_ota_hooks bb_nv bb_json bb_wifi bb_mdns bb_openapi bb_manifest bb_system bb_wdt bb_init bb_timer bb_board bb_info bb_health bb_power bb_power_tps546 bb_power_health bb_power_routes bb_fan bb_fan_routes bb_thermal bb_sensors bb_led bb_led_info bb_ntp bb_ntp_info bb_led_gpio bb_led_pwm bb_led_rgb_pwm bb_led_apa102 bb_led_anim bb_button bb_button_gpio bb_button_events bb_event bb_event_ring bb_event_routes bb_ring bb_http_client bb_release_manifest bb_update_check bb_display bb_display_info bb_temp bb_partition bb_i2c bb_heap_arena bb_arena bb_tls_creds bb_tls_info bb_mqtt bb_mqtt_info bb_net_health bb_sink_http bb_pub bb_sink_mqtt bb_sink_event bb_pub_fan bb_pub_power bb_pub_thermal bb_pub_info bb_pub_wifi bb_pub_health bb_pub_rtos bb_response bb_telemetry bb_mqtt_telemetry bb_sink_http_telemetry bb_pub_telemetry bb_sse_writer bb_websocket bb_sink_ws bb_cache bb_registry bb_task_registry
test_build_src = yes
build_src_flags = -Werror
