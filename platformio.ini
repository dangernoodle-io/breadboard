[platformio]
src_dir = test

[env:native]
platform = native
test_framework = unity
test_filter = test_host
extra_scripts =
    pre:scripts/coverage.py
    pre:scripts/native_scaffold.py
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -DBB_LED_ANIM_MOCK_CLOCK
    -DBB_BUTTON_MOCK_CLOCK
    -DBB_BUTTON_EVENTS_MOCK_CLOCK
    -DCONFIG_BB_EVENT_MAX_TOPICS=64
    -DCONFIG_BB_EVENT_MAX_PAYLOAD=512
    -DBB_EVENT_TESTING
    -DBB_EVENT_ROUTES_TESTING
    -DBB_UPDATE_CHECK_TESTING
    -lm
lib_deps = https://github.com/DaveGamble/cJSON.git#v1.7.18
custom_bb_components = bb_core bb_log bb_diag bb_http bb_prov bb_ota_pull bb_ota_push bb_ota_validator bb_nv bb_json bb_wifi bb_mdns bb_openapi bb_manifest bb_system bb_registry bb_timer bb_board bb_info bb_led bb_led_gpio bb_led_pwm bb_led_apa102 bb_led_anim bb_button bb_button_gpio bb_button_events bb_event bb_event_ring bb_event_routes bb_http_client bb_release_manifest bb_update_check
test_build_src = yes
