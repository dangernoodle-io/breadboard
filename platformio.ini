[platformio]
src_dir = test

[env:native]
platform = native
test_framework = unity
test_filter = test_host
extra_scripts = pre:scripts/coverage.py
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -Icomponents/bb_log/include
    -Icomponents/bb_http/include
    -Icomponents/bb_prov/include
    -Icomponents/bb_ota_pull/include
    -Icomponents/bb_ota_push/include
    -Icomponents/bb_ota_validator/include
    -Icomponents/bb_nv/include
    -Icomponents/bb_json/include
    -lm
lib_deps = https://github.com/DaveGamble/cJSON.git#v1.7.18
test_build_src = yes
build_src_filter = +<../platform/espidf/bb_log/bb_log.c> +<../components/bb_http/src/http_utils.c> +<../components/bb_prov/src/bb_prov_parse.c> +<../platform/espidf/bb_ota_pull/bb_ota_pull.c> +<../platform/espidf/bb_ota_push/bb_ota_push.c> +<../platform/host/bb_ota_validator/bb_ota_validator_host.c> +<../platform/espidf/bb_nv/bb_nv.c> +<../platform/host/bb_json/bb_json_cjson.c>
