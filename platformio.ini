[platformio]
src_dir = test

[env:native]
platform = native
test_framework = unity
test_filter = test_host
extra_scripts =
    pre:scripts/coverage.py
    pre:scripts/native_scaffold.py
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -lm
lib_deps = https://github.com/DaveGamble/cJSON.git#v1.7.18
custom_bb_components = bb_core bb_log bb_diag bb_http bb_prov bb_ota_pull bb_ota_push bb_ota_validator bb_nv bb_json bb_wifi bb_mdns bb_openapi bb_manifest bb_system bb_registry bb_timer bb_board bb_info
test_build_src = yes
