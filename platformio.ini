[platformio]
src_dir = test

[env:native]
platform = native
test_framework = unity
test_filter = test_host
extra_scripts =
    pre:scripts/coverage.py
    pre:scripts/bbtool_pio.py
custom_bb_board = native
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -DBB_LED_ANIM_MOCK_CLOCK
    -DBB_BUTTON_MOCK_CLOCK
    -DBB_BUTTON_EVENTS_MOCK_CLOCK
    -DCONFIG_BB_EVENT_MAX_TOPICS=64
    -DCONFIG_BB_EVENT_MAX_PAYLOAD=512
    -DCONFIG_BB_LOG_TAG_REGISTRY_MAX=24
    -DCONFIG_BB_OTA_CHECK_CUSTOM_PARSER_BUF_BYTES=8192
    -DBB_EVENT_TESTING
    -DBB_EVENT_ROUTES_TESTING
    -DBB_OTA_CHECK_TESTING
    -DBB_OTA_PULL_TESTING
    -DBB_OTA_HOOKS_TESTING
    -DBB_DISPLAY_TESTING
    -DBB_MDNS_TESTING
    -DBB_SYSTEM_TESTING
    -DBB_WDT_TESTING
    -DBB_TIMER_TESTING
    -DBB_HTTP_TESTING
    -DBB_HTTP_CLIENT_TESTING
    -DBB_TEMP_TESTING
    -DBB_HEALTH_TESTING
    -DBB_HEALTH_SECTION_TESTING
    -DBB_WIFI_TESTING
    -DBB_BOARD_TESTING
    -DBB_POWER_TESTING
    -DBB_I2C_TESTING
    -DBB_FAN_TESTING
    -DCONFIG_BB_FAN_AUTOFAN
    -DBB_MQTT_CLIENT_TESTING
    -DCONFIG_BB_MQTT_CLIENT_KEEPALIVE=120
    -DCONFIG_BB_MQTT_CLIENT_NETWORK_TIMEOUT_MS=30000
    -DCONFIG_BB_MQTT_TLS_ENABLE=1
    -DCONFIG_BB_HTTP_TLS_ENABLE=1
    -DCONFIG_BB_TLS_MUTUAL_ENABLE=1
    -DBB_CLAIM_TESTING
    -DBB_RESPONSE_TESTING
    -DBB_THERMAL_TESTING
    -DBB_SENSORS_TESTING
    -DCONFIG_BB_STORAGE_HTTP_FACTORY_RESET=1
    -DBB_STORAGE_HTTP_TESTING
    -DBB_HTTP_BODY_TESTING
    -DBB_TLS_CREDS_TESTING
    -DCONFIG_BB_MEM_ARENA_TLS_BYTES=256
    -DBB_MEM_ARENA_TLS_TESTING
    -DCONFIG_BB_METRICS_PREFIX=\"bb\"
    -DBB_CACHE_TESTING
    -DCONFIG_BB_CACHE_MAX_TOPICS=32
    -DBB_CACHE_REACTIVE_ENABLE=1
    -DCONFIG_BB_CACHE_REACTIVE_MAX_OBSERVERS=8
    -DCONFIG_BB_CACHE_REACTIVE_PAYLOAD_MAX=512
    -DBB_CACHE_REACTIVE_TESTING
    -DBB_CACHE_SERIALIZE_TESTING
    ; Registry cap bumped above the slot-table default (8, unchanged) so
    ; test_bb_cache_serialize's pre-existing slot-exhaustion fixture (9
    ; distinct keys) can register a descriptor binding for every key it
    ; writes/gets, while the SLOT table itself still exhausts at 8 -- the
    ; scenario under test. Host-only override (BB_CACHE_SERIALIZE_MAX_KEYS
    ; bypasses the ESP_PLATFORM-gated CONFIG_ bridge, which is inert here).
    ; get()'s slot-table-full (NO_SPACE) branch is only REACHABLE when
    ; MAX_KEYS > MAX_ENTRIES (more registered keys than memo slots) -- at
    ; the shipped 8/8 target default it's a defensive branch that can never
    ; trigger, so host runs 16 registry slots against 8 memo slots to keep
    ; it exercised for coverage.
    -DBB_CACHE_SERIALIZE_MAX_KEYS=16
    -DBB_MEM_STATS_ENABLE=1
    -DBB_MEM_TESTING
    -DBB_LOCK_STATS_ENABLE=1
    -DBB_REGISTRY_TESTING
    -DBB_SERIALIZE_FORMAT_TESTING
    -DBB_DATA_TESTING
    -DBB_DIAG_SECTION_TESTING
    -DBB_HTTP_SECTION_TESTING
    ; Kconfig defaults are 1536/3072 (components/bb_diag/Kconfig, B1-767 PR9);
    ; host has no sdkconfig, so the bb_diag_section_priv.h bridge falls
    ; through to its bare fallback (512/1024) unless mirrored here -- the
    ; storage/nvs and storage/partitions sections' snapshots (~1.3KB/~1KB at
    ; their default caps) need the raised scratch bound to register at all.
    -DCONFIG_BB_DIAG_SECTION_SCRATCH_BYTES=1536
    -DCONFIG_BB_DIAG_SECTION_RENDER_BUF_BYTES=3072
    -DBB_DATA_HTTP_TESTING
    -DBB_QUEUE_REGISTRY_TESTING
    -DBB_QUEUE_TESTING
    -DBB_TASK_REGISTRY_TESTING
    -DBB_TASK_TESTING
    -DCONFIG_BB_TASK_BASE_MAX=8
    ; Kconfig default is 1 (components/bb_fsm/Kconfig); overridden to 2 here
    ; so test_bb_fsm.c can prove the timer-arm seam is genuinely N-ready
    ; (multi-slot arm/overflow/disarm), not hardcoded to a single scalar.
    -DCONFIG_BB_FSM_MAX_TIMERS=2
    -DBB_UDP_CLIENT_TESTING
    -DBB_COLLECTION_TESTING
    -DBB_STORAGE_NVS_TESTING
    -DBB_STORAGE_RTC_TESTING
    -DBB_LIFECYCLE_TESTING
    ; Kconfig default is 8 (components/bb_lifecycle/Kconfig); the host env's
    ; own BB_BQUEUE_MAX_CAPACITY=4 (below) caps every host bb_bqueue instance
    ; at capacity 4, so bb_lifecycle_async's lazily-created queue is pinned
    ; down to fit -- test_bb_lifecycle_async.c's full-queue-drop scenario
    ; also stays cheap (3 items to fill, not 8).
    -DCONFIG_BB_LIFECYCLE_ASYNC_QUEUE_DEPTH=3
    -DBB_TCP_CLIENT_TESTING
    ; Kconfig default is 1 (components/bb_tcp_client/Kconfig); overridden to 2
    ; here so test_bb_tcp_client.c's pool-exhaustion test proves the free-slot
    ; scan is genuinely N-ready, not hardcoded to a single instance.
    -DBB_TCP_CLIENT_MAX_INSTANCES=2
    -DBB_BQUEUE_TESTING
    ; Kconfig defaults are capacity=16/item_bytes=64; pinned down here so
    ; test_bb_bqueue.c's MPSC fill-to-capacity/drop-on-full scenarios stay
    ; cheap (small, fixed thread counts) rather than needing 16 producers.
    ; MAX_INSTANCES is left at its Kconfig default (2 -- TaipanMiner needs
    ; exactly two, work + result); bb_bqueue_test_reset() frees every
    ; instance between tests, so no test needs a third slot to prove the
    ; free-slot scan is N-ready.
    -DBB_BQUEUE_MAX_CAPACITY=4
    -DBB_BQUEUE_MAX_ITEM_BYTES=16
    -lm
lib_deps = https://github.com/DaveGamble/cJSON.git#v1.7.18
test_build_src = yes
build_src_flags = -Werror

; Second native test env: builds the whole component graph identically to
; [env:native] EXCEPT it omits -DBB_LOCK_STATS_ENABLE=1, so BB_LOCK_STATS_ENABLE
; falls through to its C default (0) — the same value the Kconfig bridge ships
; by default (CONFIG_BB_LOCK_STATS_ENABLE, default n). test_host/test_bb_lock.c
; only ever exercises the *runtime*-disabled path (built with
; BB_LOCK_STATS_ENABLE=1); this env is the only place CI proves the
; *compile-time*-disabled path — the one that actually ships by default —
; compiles cleanly and behaves correctly. Minimal smoke test only
; (test/test_lock_stats_off/); does not re-run the full test_host suite.
[env:native_lock_stats_off]
extends = env:native
test_filter = test_lock_stats_off
build_flags =
    ${env:native.build_flags}
    -UBB_LOCK_STATS_ENABLE
