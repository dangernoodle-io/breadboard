<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>WiFi Setup</title>
<style>body{font-family:sans-serif;max-width:420px;margin:2em auto;padding:0 1em}
input,button{width:100%;padding:.6em;margin:.3em 0;box-sizing:border-box;font-size:1em}
button{background:#2b6cb0;color:#fff;border:0;border-radius:4px;cursor:pointer}</style>
</head><body>
<h2>WiFi Setup</h2>
<form method="POST" action="/save">
<label>SSID<input name="ssid" required></label>
<label>Password<input name="pass" type="password"></label>
<button type="submit">Save</button>
</form>
</body></html>
