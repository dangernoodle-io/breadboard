# bb_tls_server.conf — server-TLS telemetry sink profile
#
# Enables TLS for MQTT and/or HTTP sinks (server-authentication only; no
# client cert). Suitable for MQTTS brokers or AWS IoT HTTPS publish where
# only the server is verified by a CA certificate.
#
# Include in a consumer's platformio.ini:
#   build_flags = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults.myboard;path/to/bb_tls_server.conf"
# or via IDF cmake:
#   set(SDKCONFIG_DEFAULTS "sdkconfig.defaults;path/to/bb_tls_server.conf")
#
# Values shown are starting points. Override in your own sdkconfig as needed.
# The OTA/update-check HTTPS path (esp_http_client + crt-bundle) is independent
# of these gates and always uses TLS.
#
# IMPORTANT — apps running a TLS sink alongside a miner using the HW SHA engine
# via MMIO (e.g. TaipanMiner) MUST also set CONFIG_MBEDTLS_HARDWARE_SHA=n to
# prevent mid-handshake collisions. SW SHA costs ~200 ms extra per handshake.

# Sink TLS gates — enable the transport(s) in use; disable the other.
CONFIG_BB_MQTT_TLS_ENABLE=y
CONFIG_BB_HTTP_TLS_ENABLE=y
# Mutual TLS (client cert + key) is off in this profile; see bb_tls_mutual.conf.
CONFIG_BB_TLS_MUTUAL_ENABLE=n

# Worker stack: auto-sizes to 8192 when either TLS gate is ON (mbedTLS
# handshake + cert-bundle parse needs the headroom). Override only if needed.
# CONFIG_BB_PUB_WORKER_STACK=8192

# esp-mqtt internal task stack — raise to 8192 when using MQTTS.
CONFIG_MQTT_TASK_STACK_SIZE=8192

# esp-mqtt send/receive buffer.
CONFIG_MQTT_BUFFER_SIZE=1024

# TLS record buffers.
# IN_CONTENT_LEN=4096 works for AWS IoT (server uses ≤4 KB records); raise to
# 8192 if your broker requires full-size records (16 KB is the TLS maximum but
# too large for no-PSRAM boards). 4096 + ~1 KB overhead = ~5 KB contiguous
# internal block needed; OTA pre-flight guard checks this before handshake.
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

# Dynamic mbedTLS buffers: allocate only while a record is in flight.
# Saves ~20 KB peak heap on no-PSRAM boards at the cost of more frequent allocs.
CONFIG_MBEDTLS_DYNAMIC_BUFFER=y
