# bb_tls_mutual.conf — mutual-TLS telemetry sink profile
#
# Extends the server-TLS profile with client certificate + private key
# authentication. Required by brokers that verify the device identity (e.g.
# AWS IoT Core with per-device X.509 certs, or a private MQTTS broker with
# mTLS policy). Credentials are stored in NVS via bb_tls_creds.
#
# Include in a consumer's platformio.ini:
#   build_flags = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults.myboard;path/to/bb_tls_mutual.conf"
# or via IDF cmake:
#   set(SDKCONFIG_DEFAULTS "sdkconfig.defaults;path/to/bb_tls_mutual.conf")
#
# Values shown are starting points. Override in your own sdkconfig as needed.
# The OTA/update-check HTTPS path (esp_http_client + crt-bundle) is independent
# of these gates and always uses TLS.
#
# IMPORTANT — apps running a TLS sink alongside a miner using the HW SHA engine
# via MMIO (e.g. TaipanMiner) MUST also set CONFIG_MBEDTLS_HARDWARE_SHA=n to
# prevent mid-handshake collisions. The client-cert handshake is longer than
# server-only, so the extra ~200 ms SW SHA cost matters less here.

# Sink TLS gates — enable the transport(s) in use.
CONFIG_BB_MQTT_TLS_ENABLE=y
CONFIG_BB_HTTP_TLS_ENABLE=y
# Mutual TLS requires at least one transport gate above.
CONFIG_BB_TLS_MUTUAL_ENABLE=y

# Worker stack: mTLS handshake (CA verify + client cert + key sign) needs more
# stack depth than server-only TLS. 8192 is the auto-sized minimum; raise to
# 10240 on targets where heap is ample and handshake stack traces overflow.
CONFIG_BB_PUB_WORKER_STACK=8192

# esp-mqtt internal task stack — 8192 for MQTTS with mTLS.
CONFIG_MQTT_TASK_STACK_SIZE=8192

# esp-mqtt send/receive buffer.
CONFIG_MQTT_BUFFER_SIZE=1024

# TLS record buffers. mTLS handshake messages (cert chain) can exceed 4 KB;
# raise IN_CONTENT_LEN to 8192 if handshake fails with record-too-large errors.
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=8192
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

# Dynamic mbedTLS buffers: especially valuable with mTLS since the cert/key
# objects are only needed during the handshake window.
CONFIG_MBEDTLS_DYNAMIC_BUFFER=y
