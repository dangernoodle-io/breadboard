# bb_tls_plain.conf — plaintext-only telemetry sink profile (breadboard default)
#
# All three sink-TLS gates are OFF. This is the default breadboard build;
# the fragment mainly documents intent and keeps the mbedTLS footprint lean.
#
# Include in a consumer's platformio.ini:
#   build_flags = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults.myboard;path/to/bb_tls_plain.conf"
# or via IDF cmake:
#   set(SDKCONFIG_DEFAULTS "sdkconfig.defaults;path/to/bb_tls_plain.conf")
#
# Values shown are starting points. Override in your own sdkconfig as needed.
# The OTA/update-check HTTPS path (esp_http_client + crt-bundle) is independent
# of these gates and always uses TLS — these gates govern telemetry sinks only.

# Sink TLS gates — all off (default)
CONFIG_BB_MQTT_TLS_ENABLE=n
CONFIG_BB_HTTP_TLS_ENABLE=n
# CONFIG_BB_TLS_MUTUAL_ENABLE depends on a transport gate; not applicable here.

# Worker stack: auto-sizes to 4096 when both TLS gates are OFF.
# Only override if your plaintext sink has unusual stack requirements.
# CONFIG_BB_PUB_WORKER_STACK=4096

# Dynamic mbedTLS buffers save ~20 KB peak on no-PSRAM boards.
# Safe to enable even when no sink TLS is active (OTA path still benefits).
CONFIG_MBEDTLS_DYNAMIC_BUFFER=y
