name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Self-test lint script
        run: make check-test
      - name: Forbidden-pattern lint
        run: make check
  test:
    uses: dangernoodle-io/.github/.github/workflows/pio-test.yml@main
    secrets: inherit
  smoke:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [elecrow-p4-hmi7, esp32, esp32c3, r4_wifis3, tdongle, uno_cc3000]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install tools
        run: pip install platformio
      - name: Examples smoke build
        run: make smoke-${{ matrix.example }}
  summary:
    if: always()
    needs: [check, test, smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.check.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.smoke.result }}" != "success" ]; then
            echo "check=${{ needs.check.result }} test=${{ needs.test.result }} smoke=${{ needs.smoke.result }}"
            exit 1
          fi
