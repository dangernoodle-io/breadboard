name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  changes:
    if: github.event_name == 'pull_request'
    uses: dangernoodle-io/.github/.github/workflows/path-changes.yml@main
    with:
      filters: |
        firmware:
          - 'components/**'
          - 'platform/**'
          - 'examples/**'
          - 'cmake/**'
          - 'CMakeLists.txt'
          - 'platformio.ini'
          - 'sdkconfig/**'
          - 'Makefile'
          - 'bbtool.toml'
          - 'scripts/bbtool.py'
          - 'scripts/bbtool_pio.py'
          - 'scripts/bbtool/**'
          - 'scripts/copy_artifacts.py'
          - '.github/workflows/build.yml'
        python:
          - 'scripts/**'
          - '.github/workflows/build.yml'
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbidden-pattern lint
        run: make check
  test:
    uses: dangernoodle-io/.github/.github/workflows/pio-test.yml@main
    secrets: inherit
  py-tests:
    needs: changes
    if: github.event_name == 'pull_request' && contains(fromJSON(needs.changes.outputs.changes), 'python')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Python test deps
        run: pip install -r scripts/bbdevice/requirements.txt
      - name: Python tooling tests
        run: make test-py
  smoke:
    needs: [test, changes]
    if: github.event_name == 'pull_request' && contains(fromJSON(needs.changes.outputs.changes), 'firmware')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # r4_wifis3 / uno_cc3000 temporarily excluded — local arm64 toolchain dance; restore after toolchain fix (see backlog)
        example: [elecrow-p4-hmi7, esp32, esp32-cache-sweep, esp32c3, tdongle]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install tools
        run: pip install platformio
      - name: Examples smoke build
        run: make smoke-${{ matrix.example }}
  summary:
    if: always()
    needs: [check, test, smoke, py-tests, changes]
    runs-on: ubuntu-latest
    steps:
      - uses: dangernoodle-io/.github/.github/actions/ci-result-gate@main
        with:
          required: check=${{ needs.check.result }} test=${{ needs.test.result }}
          optional: smoke=${{ needs.smoke.result }} py-tests=${{ needs.py-tests.result }} changes=${{ needs.changes.result }}
