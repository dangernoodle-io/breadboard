; Consolidated smoke example exercising bb_log + bb_nv + bb_wifi + bb_http.
; The same main/smoke_app.c compiles unchanged across every env; the entry
; shim and bb_wifi backend differ.
;
; src_dir is set to main/ so PlatformIO's ESP-IDF builder finds the IDF main
; component there. Arduino envs use build_src_filter to pull from main/ and
; exclude the IDF-only entry_espidf.c.

[platformio]
default_envs = r4_wifis3
src_dir = main
extra_configs = platformio_local.ini

; ---------------------------------------------------------------------------
; Shared Arduino settings (Arduino envs extend this; ESP-IDF env does not).
; Note: this is NOT [env] because [env] is auto-inherited by every env, which
; would pull Arduino include paths and src filters into the ESP-IDF build.
; ---------------------------------------------------------------------------

[arduino_base]
build_flags =
    -I../../components/bb_core/include
    -I../../components/bb_log/include
    -I../../components/bb_nv/include
    -I../../components/bb_http/include
    -I../../components/bb_json/include
    -I../../components/bb_ntp/include
    -I../../components/bb_wifi/include
    -I../../components/bb_system/include
    -Iinclude
    -include secrets.h
build_src_filter =
    +<*>
    -<entry_espidf.c>
    +<../../../platform/arduino/bb_log/*.cpp>
    +<../../../platform/arduino/bb_nv/*.cpp>
    +<../../../platform/arduino/bb_http/*.cpp>
    +<../../../platform/arduino/bb_json/*.cpp>
    +<../../../platform/arduino/bb_ntp/*.cpp>
    +<../../../platform/arduino/system/*.cpp>

; ---------------------------------------------------------------------------
; Classic ESP32-D0 / WROOM-32 — ESP-IDF framework
; IDF's CMake auto-discovers main/ as the main component dir; src_dir is not
; set at the project level (it would break the Arduino envs). PIO passes the
; top-level CMakeLists.txt to IDF which finds main/ on its own.
; ---------------------------------------------------------------------------

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32dev
framework = espidf
board_build.cmake_extra_args =
    -DFIRMWARE_BOARD=esp32_wroom_32
    -DFIRMWARE_BOARD_esp32_wroom_32=1
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults.esp32
monitor_speed = 115200
board_build.partitions = partitions.esp32.csv

; ---------------------------------------------------------------------------
; ESP32-C3-DevKitM-1 — RISC-V single-core, USB-Serial-JTAG console
; ---------------------------------------------------------------------------

[env:esp32c3]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c3-devkitm-1
framework = espidf
board_build.cmake_extra_args =
    -DFIRMWARE_BOARD=esp32_c3_devkitm_1
    -DFIRMWARE_BOARD_esp32_c3_devkitm_1=1
    -DSDKCONFIG_DEFAULTS=${PROJECT_DIR}/sdkconfig.defaults.esp32c3
monitor_speed = 115200
board_build.partitions = partitions.esp32c3.csv

; ---------------------------------------------------------------------------
; Elecrow CrowPanel P4 HMI 7.0 — ESP32-P4, MIPI-DSI display (EK79007)
; ---------------------------------------------------------------------------

[env:elecrow-p4-hmi7]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-p4-evboard
framework = espidf
board_build.cmake_extra_args =
    -DFIRMWARE_BOARD=elecrow_p4_hmi7
    -DFIRMWARE_BOARD_elecrow_p4_hmi7=1
    -DBB_SMOKE_DISPLAY=1
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults.elecrow-p4-hmi7
monitor_speed = 115200
board_build.partitions = partitions.elecrow-p4-hmi7.csv

; ---------------------------------------------------------------------------
; Arduino UNO R4 WiFi (on-board ESP32-S3 radio via WiFiS3)
; ---------------------------------------------------------------------------

[env:r4_wifis3]
extends = arduino_base
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
upload_protocol = sam-ba
monitor_speed = 115200
extra_scripts = pre:scripts/patch_renesas_wifissl.py
lib_deps =
    bblanchon/ArduinoJson@^6.21.5
build_flags =
    ${arduino_base.build_flags}
    -DBB_WIFI_BACKEND_R4
build_src_filter =
    ${arduino_base.build_src_filter}
    +<../../../platform/arduino/bb_wifi/bb_wifi_r4.cpp>

; ---------------------------------------------------------------------------
; Arduino UNO (classic AVR) + Adafruit CC3000 shield
; The Adafruit_CC3000 library only supports the AVR SPI API, so this env is
; AVR-only — Cortex-M Arduino boards (R4 Minima, etc.) need a forked or
; replacement library before they can use the CC3000 backend.
; ---------------------------------------------------------------------------

[env:uno_cc3000]
extends = arduino_base
platform = atmelavr@5.1.0
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/adafruit/Adafruit_CC3000_Library.git
    bblanchon/ArduinoJson@^6.21.5
build_flags =
    ${arduino_base.build_flags}
    -DBB_WIFI_BACKEND_CC3000
build_src_filter =
    ${arduino_base.build_src_filter}
    +<../../../platform/arduino/bb_wifi/bb_wifi_cc3000.cpp>
