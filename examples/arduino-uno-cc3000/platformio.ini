[platformio]
default_envs = uno
extra_configs = platformio_local.ini

[env:uno]
platform = atmelavr@5.1.0
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/adafruit/Adafruit_CC3000_Library.git
build_flags =
    -I../../components/log_stream/include
    -I../../components/nv_config/include
    -I../../components/http_server/include
    -Iinclude
build_src_filter =
    +<*>
    +<../../../platform/arduino/log_stream/*.cpp>
    +<../../../platform/arduino/nv_config/*.cpp>
    +<../../../platform/arduino/http_server/*.cpp>

; macOS ARM64: see README.md "Local toolchain override" section for setup
