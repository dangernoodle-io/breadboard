; FOUNDATIONAL FLOOR (jae/autowire-sweep): standalone minimal example.
; See CMakeLists.txt for the regenerate/build/measure usage sequence.

[platformio]
default_envs = esp32
src_dir = main

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32dev
framework = espidf
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
monitor_speed = 115200
board_build.partitions = partitions.csv
