; FOUNDATIONAL FLOOR (jae/di-foundation): standalone minimal example,
; hand-wired (no bb_init, no autowire/codegen pre-step). See CMakeLists.txt
; for the build/measure usage sequence, and `make floor-codegen` in the repo
; Makefile to prove the codegen path against this same component set.

[platformio]
default_envs = esp32
src_dir = main

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32dev
framework = espidf
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
monitor_speed = 115200
board_build.partitions = partitions.csv
