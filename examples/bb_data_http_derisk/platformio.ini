; THROWAWAY DE-RISK EXAMPLE (B1-1033, design KB 1447): standalone, hand-wired
; (no bb_init, no autowire/codegen). See CMakeLists.txt for the build usage.
; DELETED wholesale at the B1-1045 cutover.

[platformio]
default_envs = esp32
src_dir = main

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32dev
framework = espidf
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
monitor_speed = 115200
board_build.partitions = partitions.csv
